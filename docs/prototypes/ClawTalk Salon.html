<title>ClawTalk · Salon (hi-fi prototype)</title>

<!-- Tailwind play CDN, configured before load. -->
<script>
  window.tailwind = window.tailwind || {};
  window.tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          serif:   ['"Newsreader"', 'Georgia', 'serif'],
          display: ['"Instrument Serif"', 'Georgia', 'serif'],
          sans:    ['"Geist"', '"IBM Plex Sans"', 'system-ui', 'sans-serif'],
          mono:    ['"Geist Mono"', '"JetBrains Mono"', 'ui-monospace', 'monospace'],
        },
      },
    },
  };
</script>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Instrument+Serif:ital@0;1&display=swap"
  rel="stylesheet"
>

<style>
  :root {
    --salon-accent: #C8643A;
    --salon-ink:    #1F1B16;
    --salon-ink-2:  #6B6660;
    --salon-paper:  #FBF7EF;
    --salon-paper-2:#F4ECDB;
    --salon-card:   #FFFFFF;
    --salon-line:   #E6E0D1;
  }
  html, body { background: var(--salon-paper); color: var(--salon-ink); font-family: 'Geist', system-ui, sans-serif; }
  body { margin: 0; min-height: 100vh; }
  button { cursor: pointer; }

  /* Subtle screen-transition fade. */
  .ct-screen-enter { animation: ctFadeIn 220ms ease-out both; }
  @keyframes ctFadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  /* Hide scrollbars where we use overflow-auto inside chrome. */
  .ct-thin-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
  .ct-thin-scroll::-webkit-scrollbar-thumb { background: rgba(31,27,22,0.14); border-radius: 8px; }
  .ct-thin-scroll::-webkit-scrollbar-track { background: transparent; }

  /* Streaming caret. */
  .ct-caret { display: inline-block; width: 7px; height: 18px; background: currentColor; margin-left: 2px; vertical-align: text-bottom; animation: ctBlink 800ms steps(1) infinite; }
  @keyframes ctBlink { 50% { opacity: 0; } }

  /* Dot pulse. */
  .ct-pulse { animation: ctPulse 1.6s ease-in-out infinite; }
  @keyframes ctPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

  /* Density */
  body.density-cozy   { font-size: 14px; }
  body.density-compact { font-size: 13px; }
</style>

<!-- React + Babel -->

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"

</head>

</html>
