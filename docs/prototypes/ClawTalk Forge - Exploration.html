<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Forge — design exploration</title>

<script>
  window.tailwind = window.tailwind || {};
  window.tailwind.config = { theme: { extend: {} } };
</script>
<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Instrument+Serif:ital@0;1&display=swap"
  rel="stylesheet"
>
<style>
  html, body { margin: 0; font-family: 'Geist', system-ui, sans-serif; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
        integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
        crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
        integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
        crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
        integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
        crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="shared/data.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="prototype/forge-canvas.jsx"></script>

  <script type="text/babel">
    function ForgeExploration() {
      return (
        <DesignCanvas>
          <DCSection id="rationale" title="Design rationale" subtitle="Recommendations, answering the brief">
            <DCArtboard id="why" label="Rationale" width={720} height={472}>
              <RationalePanel />
            </DCArtboard>
          </DCSection>

          <DCSection id="entry" title="Where Forge lives" subtitle="Three entry surfaces — they stack; ship A first">
            <DCArtboard id="a" label="A · Doc-pane action (recommended)" width={440} height={600}>
              <EntryDocPane />
            </DCArtboard>
            <DCArtboard id="b" label="B · Forge home in the rail" width={440} height={600}>
              <EntryNav />
            </DCArtboard>
            <DCArtboard id="c" label="C · Full-screen workspace" width={440} height={600}>
              <EntryFullscreen />
            </DCArtboard>
          </DCSection>

          <DCSection id="gallery" title="Picking the winner" subtitle="Three version-gallery layouts">
            <DCArtboard id="d" label="D · Leaderboard" width={440} height={430}>
              <GalleryBoard />
            </DCArtboard>
            <DCArtboard id="e" label="E · Side-by-side diff" width={440} height={430}>
              <GalleryDiff />
            </DCArtboard>
            <DCArtboard id="f" label="F · Card grid" width={440} height={430}>
              <GalleryGrid />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<ForgeExploration />);
  </script>
</body>
</html>
