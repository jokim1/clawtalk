# clawtalk — Cloudflare Workers config.
#
# Phase 5 PR 1 lands this file as the foundation for the cloud cutover that
# happens in PR 2. It is consumed by `wrangler dev` (local dev pointing at
# `supabase start`) and `wrangler deploy` (CI/CD, deferred until clawtalk's
# Cloudflare project is provisioned).
#
# Bindings:
#   - [assets]   serves webapp/dist with SPA fallback for /* (non-API)
#   - [[hyperdrive]] DB  pooled Postgres connection to Supabase
#   - [[kv_namespaces]] JWKS_CACHE  caches Supabase JWKS for D2 auth
#   - [[queues.producers]] TALK_RUN_QUEUE  enqueues all Talk runs (6A)
#   - [[queues.consumers]] TALK_RUN_QUEUE  consumer worker for runs
#
# Secrets are set via `wrangler secret put` and never live in this file.

name = "clawtalk"
main = "src/worker.ts"

compatibility_date = "2026-05-12"
compatibility_flags = ["nodejs_compat"]

# Persist invocation logs (Workers Logs). Added 2026-06-12 to diagnose
# wedged queue-consumer runs — `wrangler tail` only surfaces invocations
# that COMPLETE, so a wedged run was invisible. With this on, breadcrumb
# logs from in-flight invocations are queryable in the dashboard.
[observability]
enabled = true

# ─── Local dev ────────────────────────────────────────────────────────
#
# Pin `wrangler dev` to :8788 so the local target is deterministic.
# Bare `wrangler dev` defaults to :8787, but the webapp dev proxy
# (webapp/vite.config.ts) and APP_ORIGIN both target :8788 — without
# this pin the proxy points at a port nothing is listening on. Dev-only;
# ignored by `wrangler deploy`.
[dev]
port = 8788

# ─── Static Assets ────────────────────────────────────────────────────
#
# `run_worker_first = true` is load-bearing for OAuth callback flows. Without
# it, Cloudflare's asset handler intercepts browser-navigation GETs that
# accept text/html and serves index.html via SPA fallback BEFORE the Worker
# runs — even for /api/* paths. That silently breaks any route that returns
# HTML for a browser-issued redirect (e.g. /api/v1/auth/google/callback,
# which returns a close-window HTML for the OAuth popup). With this flag,
# the Worker always runs first; src/worker.ts delegates non-/api/* paths
# to env.ASSETS.fetch, so the SPA still loads through the asset handler
# with the SPA fallback intact.
[assets]
directory = "./webapp/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

# ─── Hyperdrive — pooled Postgres to Supabase ─────────────────────────
#
# Create via:
#   wrangler hyperdrive create clawtalk-pg \
#     --connection-string "postgresql://postgres.<ref>:<password>@aws-1-us-east-1.pooler.supabase.com:5432/postgres"
#
# Use the Supavisor SESSION pooler (port 5432) — Hyperdrive needs prepared
# statements, which the Transaction pooler (6543) disallows. Replace the
# `id` below with the value `wrangler hyperdrive create` prints.
[[hyperdrive]]
binding = "DB"
id = "0bca93f7b90b4b5d8443215428ee59b2"
# Local supabase stack runs on the clawtalk-specific 54430–54439 port
# range (see supabase/config.toml). 54432 is the database port.
localConnectionString = "postgresql://postgres:postgres@127.0.0.1:54432/postgres"

# ─── KV — Supabase JWKS cache ─────────────────────────────────────────
#
# Create via:
#   wrangler kv namespace create JWKS_CACHE
[[kv_namespaces]]
binding = "JWKS_CACHE"
id = "6fc09c6972224a32971b573a8628e5de"

# ─── R2 — Talk attachments + context source blobs ─────────────────────
#
# Backs `attachment-storage.ts` (Talk-level Context source files +
# per-message attachments). Replaces the Node-mode local filesystem
# path, which has no Workers analogue.
#
# Create via:
#   wrangler r2 bucket create clawtalk-attachments
#
# `wrangler dev` provisions a local R2 simulator automatically — no
# preview bucket required.
[[r2_buckets]]
binding = "ATTACHMENTS"
bucket_name = "clawtalk-attachments"

# ─── R2 — inline content images (rich-text editor) ────────────────────
#
# Backs the rich-text editor's image upload/paste flow. Images are
# stored under `ci/{sha256}.{ext}` keys and served same-origin through
# /api/v1/content-images/:key — never via R2.dev or a custom domain.
#
# Create via:
#   wrangler r2 bucket create clawtalk-content-images
[[r2_buckets]]
binding = "CONTENT_IMAGES"
bucket_name = "clawtalk-content-images"

# ─── Queues — multi-agent run dispatch ────────────────────────────────
#
# Create via:
#   wrangler queues create clawtalk-talk-runs
#
# Producer + consumer share the same Worker (single deployment) — fetch
# requests enqueue, the queue handler consumes. Runs that hit Worker CPU
# limits survive because the consumer Worker is invoked independently of
# the original HTTP request, and the run state persists in talk_runs.
[[queues.producers]]
binding = "TALK_RUN_QUEUE"
queue = "clawtalk-talk-runs"

[[queues.consumers]]
queue = "clawtalk-talk-runs"
max_batch_size = 1
# T9 baseline (2026-05-27) observed ~5s between POST /chat and queue
# consumer firing. CF docs claim max_batch_timeout caps the wait for a
# partial batch, so with max_batch_size=1 it should be a no-op (every
# batch is already "full"). Dropping to 0 tests whether the docs are
# accurate or the 5s is actually load-bearing here.
max_batch_timeout = 0
max_retries = 3
dead_letter_queue = "clawtalk-talk-runs-dlq"

# DLQ consumer — messages that exhaust max_retries above land here.
# The handler flips the corresponding runs row to 'failed' with
# error_json.code='dlq_exhausted' so the UI moves on. Transient
# DB/outbox infrastructure failures retry here too; scheduler sweeps
# remain the final stuck-run backstop.
[[queues.consumers]]
queue = "clawtalk-talk-runs-dlq"
max_batch_size = 5
max_batch_timeout = 30
max_retries = 3

# ─── Cron triggers — job scheduler ────────────────────────────────────
#
# Replaces the Node-mode TalkJobWorker polling loop. Every minute the
# scheduled() handler in src/worker.ts claims due jobs and dispatches
# them onto TALK_RUN_QUEUE. Sub-minute granularity isn't needed for the
# current product (jobs are "daily report at 9am" shape). U4 lands the
# real scheduler; U1 wires the trigger + a stub.
[triggers]
crons = ["* * * * *"]

# ─── Durable Objects — W7 live events ─────────────────────────────────
#
# UserEventHub: one DO per signed-in user. Holds hibernating WebSocket
# connections and drains outbox notifies into live frames. Produced by
# the Worker (which forwards /api/v1/events upgrades via
# `idFromName(userId).fetch(/upgrade)`) and notified by the run-worker
# producer side after every outbox INSERT.
[[durable_objects.bindings]]
name = "USER_EVENT_HUB"
class_name = "UserEventHub"

# TalkRunner: one DO per Talk (idFromName(talkId)). Owns run execution —
# SQLite step log + state machine (Talk Runtime v2, docs/13 §6). Wave 2
# PR-A1 lands the skeleton behind a dev-only route; /chat keeps dispatching
# through TALK_RUN_QUEUE until PR-C flips the dispatch call.
[[durable_objects.bindings]]
name = "TALK_RUNNER"
class_name = "TalkRunner"

[[migrations]]
tag = "v1-user-event-hub"
new_sqlite_classes = ["UserEventHub"]

# Append-only, ordered after v1. SQLite-backed from the start (the step log
# lives in DO SQLite, not KV storage).
[[migrations]]
tag = "v2-talk-runner"
new_sqlite_classes = ["TalkRunner"]

# ─── Secrets (set via CLI, not here) ──────────────────────────────────
#
#   wrangler secret put CLAWTALK_PROVIDER_SECRET_KEY
#     Master encryption passphrase for llm_provider_secrets (AES-256-GCM
#     + PBKDF2-100k). Replaces the local-keychain path used in SQLite mode.
#
#   wrangler secret put SUPABASE_PUBLISHABLE_KEY
#     Supabase anon key (`sb_publishable_...`). Used by auth-refresh /
#     auth-logout to call Supabase's REST auth endpoints.
#
#   wrangler secret put DB_EVENT_HUB_URL
#     Postgres connection string scoped to the `clawtalk_event_hub`
#     LOGIN role (NOBYPASSRLS + SELECT-only on event_outbox). Created
#     by migration 0005 in U3. The UserEventHub DO uses this URL for
#     outbox SELECT during replay + notify drain — it never sees user
#     credentials. Migration 0006 (which revokes outbox SELECT from
#     `authenticated`) must NOT apply until this secret is set.
#
#   wrangler secret put GOOGLE_OAUTH_CLIENT_ID
#   wrangler secret put GOOGLE_OAUTH_CLIENT_SECRET
#     Google OAuth app credentials. Create the OAuth client at
#     console.cloud.google.com/apis/credentials → "OAuth 2.0 Client IDs"
#     with the redirect URI matching GOOGLE_OAUTH_REDIRECT_URI declared
#     in [vars] below. Required for any Google sign-in / Drive / Docs
#     flow on the Worker.
#
#   wrangler secret put GOOGLE_PICKER_API_KEY
#   wrangler secret put GOOGLE_PICKER_APP_ID
#     Google Picker SDK credentials, required for the "Add file/folder
#     from Drive" buttons in the Talk Context tab. Without these the
#     `buildGooglePickerSession` service throws google_picker_not_configured
#     and the UI shows "Google Picker is not configured on this server."
#     - API_KEY: Cloud Console → Credentials → "API key", restricted to
#       the Google Picker API (enable it first under "Library").
#     - APP_ID: the GCP project NUMBER (all digits), NOT the project ID.
#       Find it on the Cloud Console dashboard or in any OAuth client
#       JSON. Must be the same GCP project as the OAuth client above.
#
#   wrangler secret put SLACK_CLIENT_ID
#   wrangler secret put SLACK_CLIENT_SECRET
#     Slack OAuth app credentials. Create the app at api.slack.com/apps,
#     configure bot scopes (channels:read, groups:read, im:read, mpim:read,
#     chat:write, channels:history, groups:history, im:history, mpim:history,
#     app_mentions:read, users:read) and the redirect URL declared in
#     [vars].SLACK_OAUTH_REDIRECT_URI below.
#
# What does NOT live as a Workers Secret:
#   - SUPABASE_PROJECT_URL: declared in [vars] (non-secret).
#   - VITE_SUPABASE_URL + VITE_SUPABASE_ANON_KEY: webapp build-time vars;
#     CI sources them from GitHub Actions secrets.

# ─── Plain (non-secret) vars ──────────────────────────────────────────
[vars]
PUBLIC_MODE = "true"
WEB_SECURE_COOKIES = "true"
TRUSTED_PROXY_MODE = "cloudflare"
CLAWTALK_ALLOWED_ORIGINS = "https://clawtalk.jokim1.workers.dev,https://clawtalk.app"
# Content-image upload Origin allowlist. Comma-separated; union covers
# prod + local dev. Browsers set Origin from the page URL, so listing
# localhost here doesn't expand attack surface (evil.com can't forge
# Origin: http://localhost:*).
APP_ORIGIN = "https://clawtalk.app,http://localhost:5173,http://localhost:8788"
SUPABASE_PROJECT_URL = "https://rnxkflekfhliradthulp.supabase.co"
GOOGLE_OAUTH_REDIRECT_URI = "https://clawtalk.app/api/v1/auth/google/callback"
SLACK_OAUTH_REDIRECT_URI = "https://clawtalk.app/api/v1/auth/slack/callback"
