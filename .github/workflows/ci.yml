name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npx tsc --noEmit

      # MVP eval gate: deterministic dry-run scenarios only. Live/provider
      # grading stays manual until the backend/provider adapter exists.
      - name: MVP eval dry-run
        run: npm run eval

      # Webapp (Vite/React) is a separate package with its own lockfile,
      # tsconfig, and jsdom vitest config; the root `vitest run` above does
      # not pick up webapp/src tests, so gate them explicitly here. No
      # Supabase needed — these are jsdom unit tests.
      - name: Install webapp deps
        run: npm --prefix webapp ci

      - name: Webapp typecheck
        run: npm --prefix webapp run typecheck

      - name: Webapp tests
        run: npm --prefix webapp run test

      # Phase 5 PR 2 — pg-side tests talk to a real Postgres + Supabase
      # Auth schema (migrations under `supabase/migrations/` apply
      # automatically on `supabase start`, including the
      # `on_auth_user_created` trigger that tests depend on).
      # Tests using `_initTestDatabase` (sqlite:memory) run in this
      # same job — they don't depend on the Supabase stack, just on
      # the runner having Node + the lockfile installed.
      - uses: supabase/setup-cli@v2.1.1
        with:
          version: latest
          github-token: ${{ github.token }}

      - name: Start Supabase
        run: supabase start --workdir .

      - name: Tests
        env:
          CLAWTALK_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54432/postgres
        run: npx vitest run
