name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-progress deploys when a newer push to main lands. Deploys
# are idempotent — supabase db push only applies pending migrations,
# wrangler deploy overwrites the live Worker — so superseding mid-run
# is safe.
#
# PR CI in ci.yml gates typecheck + tests + format before main merge.
# Deploy trusts that gate and only runs build + migrate + deploy.
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install backend deps
        run: npm ci

      - name: Install webapp deps
        run: npm --prefix webapp ci

      # Vite builds the React app into webapp/dist; the Worker's
      # [assets] binding (wrangler.toml) ships those files alongside
      # the Worker. Build must happen before wrangler deploy so the
      # binding has files to upload.
      #
      # The webapp reads VITE_SUPABASE_URL + VITE_SUPABASE_ANON_KEY at
      # Vite build time (see webapp/src/lib/supabase-client.ts) — these
      # values get baked into the static bundle, not read at runtime.
      # Required GitHub repo secrets:
      #   VITE_SUPABASE_URL       — https://<ref>.supabase.co
      #   VITE_SUPABASE_ANON_KEY  — Supabase publishable key (sb_publishable_...)
      - name: Build webapp
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm --prefix webapp run build

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # W7-evtsse predeploy gate. Aborts the deploy if migration 0006
      # is in the tree but DB_EVENT_HUB_URL is unset. No-op otherwise.
      # See scripts/verify-deploy-secrets.sh + the migration files
      # under supabase/migrations/0005_*, 0006_*, 9999_*.sql.
      - name: Verify deploy-time secrets (W7 gate)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: ./scripts/verify-deploy-secrets.sh

      # Migrations run before the Worker so the new schema is live
      # when the new Worker code starts taking traffic. `supabase db
      # push --include-all` applies every pending migration against
      # the linked project; re-runs are no-ops.
      #
      # --include-all is required because `9999_rollback_outbox_authenticated.sql`
      # was deliberately named with a `9999` prefix to sort last, but
      # any future migration with a lower-numbered prefix (e.g. 0007)
      # is then "back-dated" relative to the already-applied 9999 and
      # `supabase db push` refuses to apply it without --include-all.
      #
      # Required GitHub repo secrets:
      #   SUPABASE_ACCESS_TOKEN  — Supabase Management API token
      #   SUPABASE_DB_PASSWORD   — postgres role password for the
      #                            cloud project (Database settings)
      #   SUPABASE_PROJECT_REF   — project ref slug (e.g. xkhxyzabc)
      - name: Apply Supabase migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase db push --include-all

      # Sync SUPABASE_PUBLISHABLE_KEY as a Workers Secret BEFORE the
      # deploy step so the new Worker code (auth-refresh + auth-logout,
      # which call Supabase's REST auth endpoints with this value as
      # the `apikey` header) sees it on first request. The publishable
      # key is non-secret (it ships in every webapp HTML bundle as
      # VITE_SUPABASE_ANON_KEY) — we store it as a Workers Secret only
      # to keep the literal value out of the committed wrangler.toml.
      # `wrangler secret put` is idempotent: overwrites without error.
      - name: Sync SUPABASE_PUBLISHABLE_KEY Workers Secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$PUBLISHABLE_KEY" ]; then
            echo "::error ::VITE_SUPABASE_ANON_KEY repo secret is empty; aborting"
            exit 1
          fi
          printf '%s' "$PUBLISHABLE_KEY" | npx wrangler secret put SUPABASE_PUBLISHABLE_KEY

      # Deploy the Worker. Static Assets are picked up from webapp/dist
      # via the [assets] binding declared in wrangler.toml. Workers
      # Secrets (CLAWTALK_PROVIDER_SECRET_KEY, SUPABASE_PUBLISHABLE_KEY)
      # live in Cloudflare's Worker config — see wrangler.toml comments
      # for the full list and how each is set.
      #
      # Required GitHub repo secret:
      #   CLOUDFLARE_API_TOKEN  — token with "Edit Cloudflare Workers"
      #                           permission scoped to the clawtalk
      #                           account
      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
